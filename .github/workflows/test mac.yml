name: "macOS Remote Suite - Monterey Clean"
on:  
  workflow_dispatch:    
    inputs:      
      macos_version:        
        description: "Select macOS Version"        
        required: true        
        default: "macos-14"        
        type: choice        
        options:          
          - "macos-latest"          
          - "macos-15"          
          - "macos-14"      
      REMOTE_PASSWORD:        
        description: "Set password for HopToDesk"        
        default: "password123"        
        required: true

jobs:  
  remote-access:    
    name: "🚀 Full Access Runner"    
    runs-on: ${{ github.event.inputs.macos_version }}    
    steps:      
      - name: "👤 Create Admin Account"        
        run: |          
          USERNAME="admin"          
          PASSWORD="123456"          
          sudo dscl . -create /Users/$USERNAME          
          sudo dscl . -passwd /Users/$USERNAME $PASSWORD          
          sudo dscl . -append /Groups/admin GroupMembership $USERNAME          
          echo "✅ Admin account created"      

      - name: "🚫 Disable Sleep & Keep Screen On"        
        run: |          
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0 hibernatemode 0          
          nohup caffeinate -dis &            
          echo "✅ Power management set"      

      - name: "📦 Install HopToDesk"        
        run: |          
          curl -L -o /tmp/hoptodesk.dmg "https://www.hoptodesk.com/HopToDesk.dmg"
          sudo hdiutil attach /tmp/hoptodesk.dmg -nobrowse
          MOUNT_POINT=$(ls /Volumes | grep -i "HopToDesk" | head -n 1)
          sudo cp -R "/Volumes/$MOUNT_POINT/HopToDesk.app" /Applications/
          sudo hdiutil detach "/Volumes/$MOUNT_POINT" -force
          echo "✅ HopToDesk installed"      

      - name: "🖥️ Install Chrome Remote Desktop"        
        run: |          
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg          
          sudo hdiutil attach /tmp/crd.dmg -nobrowse          
          PKG_PATH=$(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg" | head -n 1)          
          sudo installer -pkg "$PKG_PATH" -target /          
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force          
          echo "✅ CRD installed"      

      - name: "🌐 Install Antidetect Browsers (macOS 14 Only)"        
        if: github.event.inputs.macos_version == 'macos-14'        
        run: |          
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-arm64-setup.dmg"          
          sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse          
          MOUNT_ML=$(ls /Volumes | grep -i "MostLogin" | head -n 1)          
          sudo cp -R "/Volumes/$MOUNT_ML/MostLogin.app" /Applications/          
          sudo hdiutil detach "/Volumes/$MOUNT_ML" -force
          curl -L -o /tmp/gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"          
          sudo hdiutil attach /tmp/gologin.dmg -nobrowse          
          MOUNT_GL=$(ls /Volumes | grep -i "GoLogin" | head -n 1)          
          sudo cp -R "/Volumes/$MOUNT_GL/GoLogin.app" /Applications/          
          sudo hdiutil detach "/Volumes/$MOUNT_GL" -force          
          echo "✅ Browsers installed"      

      - name: "🧹 Clean Dock & FORCE Purple Wallpaper"        
        run: |          
          # 1. Reset and Clear Dock
          defaults write com.apple.dock persistent-apps -array

          # 2. Add Requested Apps to Dock
          # Launchpad (System App)
          defaults write com.apple.dock persistent-apps -array-add '<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/System/Applications/Launchpad.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>'
          
          # System Settings, MostLogin, HopToDesk, Chrome
          APPS=(
            "/System/Applications/System Settings.app"
            "/Applications/MostLogin.app"
            "/Applications/HopToDesk.app"
            "/Applications/Google Chrome.app"
          )

          for APP in "${APPS[@]}"; do
            if [ -d "$APP" ]; then
              defaults write com.apple.dock persistent-apps -array-add "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>$APP</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
            fi
          done

          # 3. Kill Wallpaper Video Services (The "Green Hill" culprit)
          sudo killall WallpaperAgent || true
          sudo killall AerialWallpaperVideoService || true
          
          # 4. Force Static Purple Wallpaper
          WP_PATH="/System/Library/Desktop Pictures/Monterey Graphic.heic"
          sqlite3 ~/Library/Application\ Support/Dock/desktoppicture.db "update data set value = '$WP_PATH'" || true
          osascript -e "tell application \"System Events\" to set picture of every desktop to \"$WP_PATH\""
          
          # 5. Restart Dock
          killall Dock
          echo "✅ Dock and Wallpaper updated"

      - name: "🔓 Inject Permissions (Ctrl+C/V & Remote Control)"        
        run: |          
          H_BUNDLE="com.hoptodesk.hoptodesk"          
          CRD_BUNDLE="com.google.chromeremotedesktop.me2me-host"                    
          SERVICES=("kTCCServiceScreenCapture" "kTCCServiceAccessibility" "kTCCServicePostEvent")          
          APPS=("$H_BUNDLE" "$CRD_BUNDLE")          
          
          SYS_TCC="/Library/Application Support/com.apple.TCC/TCC.db"          
          USER_TCC="$HOME/Library/Application Support/com.apple.TCC/TCC.db"          
          
          sudo launchctl stop com.apple.tccd || true          
          sudo killall -9 tccd || true          
          sleep 2          
          
          for DB in "$SYS_TCC" "$USER_TCC"; do            
            sudo mkdir -p "$(dirname "$DB")"            
            if [ ! -f "$DB" ]; then sudo touch "$DB"; fi            
            for APP in "${APPS[@]}"; do              
              for SERVICE in "${SERVICES[@]}"; do                
                sudo sqlite3 "$DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags, last_modified) VALUES ('$SERVICE', '$APP', 0, 2, 4, 1, 0, strftime('%s','now'));"              
              done            
            done          
          done          
          
          sudo launchctl start com.apple.tccd || true          
          echo "✅ Permissions injected"      

      - name: "🚀 Configure HopToDesk Password"        
        run: |          
          PW="${{ github.event.inputs.REMOTE_PASSWORD }}"                    
          open -a "HopToDesk"
          sleep 12
          sudo /Applications/HopToDesk.app/Contents/MacOS/HopToDesk --password "$PW"
          echo "✅ Password set"      

      - name: "📸 Extract ID & Final Console Log"        
        run: |          
          sleep 15          
          H_ID=$(/Applications/HopToDesk.app/Contents/MacOS/HopToDesk --get-id 2>/dev/null | grep -oE '[0-9]+' | head -n 1 || echo "Not Found")          
          screencapture -x /tmp/ready.png          
          URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/ready.png" https://catbox.moe/user/api.php)          
          echo "------------------------------------------------------"          
          echo "🆔 HOPTODESK ID: $H_ID"          
          echo "🔗 ID SCREENSHOT: $URL"          
          echo "🔑 REMOTE PASS:  ${{ github.event.inputs.REMOTE_PASSWORD }}"          
          echo "👤 ADMIN USER:   admin | PASS: 123456"          
          echo "------------------------------------------------------"      

      - name: "🔄 Quiet Connection Loop"        
        run: |          
          while true; do            
            CONN_COUNT=$(netstat -an | grep ESTABLISHED | grep -Ei "21116|21117|443" | wc -l)
            if [ "$CONN_COUNT" -le 3 ]; then
                if ! pgrep -x "HopToDesk" > /dev/null; then open -a "HopToDesk"; fi
            fi
            sleep 120          
          done
