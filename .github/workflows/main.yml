name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      MAC_PASS:
        description: "[macOS] Permanent AnyDesk Password"
        required: false
        default: "CloudPC123!"

jobs:
  # ==========================================
  # WINDOWS JOB (Fully Automated CRD)
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022
    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ Missing CRD Code! Please get it from remotedesktop.google.com/headless"
            exit 1
          }

      - name: "🔊 Enable Audio"
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv

      - name: "🔧 Install CRD & Virtual Audio"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"

      - name: "🕵️‍♂️ Install MostLogin"
        run: |
          $mlInstaller = "$env:USERPROFILE\Downloads\MostLogin-setup.exe"
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-setup.exe" -OutFile $mlInstaller -UseBasicParsing
          Start-Process -FilePath $mlInstaller -ArgumentList "/S" -Wait

      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          # Use cmd to execute the RAW_CODE directly
          cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"

      - name: "⏳ Keep Alive"
        run: |
          Write-Host "✅ Windows PC Ready. Connect via Chrome Remote Desktop."
          while ($true) { 
            Write-Host "Heartbeat: $(Get-Date)"
            Start-Sleep -Seconds 300 
          }

  # ==========================================
  # MACOS JOB (AnyDesk with Fixes)
  # ==========================================
  macos-setup:
    name: "🍏 macOS Remote Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-15
    env:
      MAC_PASS: ${{ github.event.inputs.MAC_PASS }}
    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "CloudPC123!" -admin
      
      - name: "🚫 System Prep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          # Disable screen lock
          defaults write com.apple.screensaver idleTime 0
      
      - name: "🖥️ Install AnyDesk & MostLogin"
        run: |
          brew install --cask anydesk
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          MOUNT_ML=$(sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep -o '/Volumes/.*')
          sudo cp -R "$MOUNT_ML"/*.app /Applications/
          sudo hdiutil detach "$MOUNT_ML" -force
      
      - name: "🚀 Configure AnyDesk"
        run: |
          set +e
          echo "Setting up AnyDesk..."
          
          # Force set the password in the config file before launching
          mkdir -p ~/.anydesk
          echo "ad.security.interactive_access=0" > ~/.anydesk/system.conf
          echo "ad.security.allow_remote_restart=1" >> ~/.anydesk/system.conf
          
          # Launch service
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
          sleep 10
          
          # Set Password (using the command line tool)
          echo "${{ env.MAC_PASS }}" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          
          # Get ID
          ANY_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          echo "ANY_ID=$ANY_ID" >> $GITHUB_ENV
          
          echo "========================================"
          echo "ID: $ANY_ID"
          echo "PASS: ${{ env.MAC_PASS }}"
          echo "========================================"

      - name: "⏳ Keep Alive & Heartbeat"
        run: |
          echo "✅ Runner active. Connect to: ${{ env.ANY_ID }}"
          # Prevent runner timeout by printing every 60s
          for i in {1..360}; do
            echo "Session active... Minute $i/360"
            # Ensure AnyDesk service stays alive
            if ! pgrep -f AnyDesk > /dev/null; then
               echo "Re-launching AnyDesk..."
               sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
            fi
            sleep 60
          done
