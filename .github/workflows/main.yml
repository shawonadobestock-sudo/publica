name: "macOS RustDesk - Continuous OCR"

on:
  workflow_dispatch:
    inputs:
      RUSTDESK_PASSWORD:
        description: "Set a custom RustDesk password"
        default: "password123"
        required: true

jobs:
  rustdesk:
    name: "🦀 OCR Monitoring"
    runs-on: macos-15

    steps:
      - name: "🦀 Install Tools"
        run: |
          brew install --cask rustdesk
          brew install tesseract
          echo "✅ Tools installed"

      - name: "🔓 Grant Permissions"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          RUSTDESK="com.carriez.rustdesk"
          SQL_QUERY="INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$RUSTDESK', 0, 2, 4, 1, 0); INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$RUSTDESK', 0, 2, 4, 1, 0);"
          sudo sqlite3 "$TCC_DB" "$SQL_QUERY"
          sudo killall -9 tccd || true

      - name: "🚀 Start RustDesk"
        run: |
          RUSTDESK_APP=$(find /Applications -name "RustDesk.app" -type d | head -1)
          open "$RUSTDESK_APP"
          "$RUSTDESK_APP/Contents/MacOS/rustdesk" --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "✅ RustDesk started"

      - name: "🔄 Connection Loop with Continuous OCR"
        run: |
          # Define the OCR and Screenshot function
          capture_and_ocr() {
            echo "📸 Capturing screen..."
            # Use absolute paths and ensure the directory exists
            local IMG_PATH="/tmp/rust_screen.png"
            local OUT_PATH="/tmp/ocr_results"
            
            # Take screenshot
            screencapture -x "$IMG_PATH"
            sleep 2 # Small buffer to ensure file is written
            
            if [ ! -f "$IMG_PATH" ]; then
              echo "❌ Error: Screenshot file not found!"
              return
            fi

            # Perform OCR
            tesseract "$IMG_PATH" "$OUT_PATH" -l eng
            
            # Extract ID and OTP
            # RustDesk IDs are usually 9-10 digits with spaces
            local RAW_ID=$(grep -E -o '[0-9 ]{9,12}' "${OUT_PATH}.txt" | tr -d ' ' | head -n 1)
            # Find the word 'password' and take the next non-empty line
            local RAW_OTP=$(grep -A 2 -i "password" "${OUT_PATH}.txt" | tail -n 1 | xargs)

            # Upload to Cloud
            local URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@$IMG_PATH" https://catbox.moe/user/api.php)

            echo "------------------------------------------------------"
            echo "⏰ UPDATE: $(date)"
            echo "🆔 DETECTED ID: $RAW_ID"
            echo "🎲 ONE-TIME PW: $RAW_OTP"
            echo "🔗 SCREENSHOT:  $URL"
            echo "------------------------------------------------------"
          }

          echo "⏳ Initializing first capture in 25s..."
          sleep 25
          capture_and_ocr

          PREVIOUS_STATE="off"
          while true; do
            # Monitor network for RustDesk connection
            CONN_COUNT=$(netstat -an | grep ESTABLISHED | grep -Ei "\.21116|\.21117" | wc -l)

            if [ "$CONN_COUNT" -gt 0 ]; then
                if [ "$PREVIOUS_STATE" == "off" ]; then
                    echo "🌐 User connected."
                    PREVIOUS_STATE="on"
                fi
            else
                if [ "$PREVIOUS_STATE" == "on" ]; then
                    echo "⚠️ Disconnected! Refreshing credentials..."
                    open -a "RustDesk" # Bring to front
                    sleep 5
                    capture_and_ocr
                    PREVIOUS_STATE="off"
                fi
            fi
            sleep 15
          done
