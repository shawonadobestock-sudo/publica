name: "High-Speed Cloud PC (Ngrok Tunnel)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select OS"
        type: choice
        options:
          - Windows
          - macOS
        default: Windows
        required: true

jobs:
  deploy-cloud-pc:
    name: "🚀 ${{ github.event.inputs.os_choice }} Runner"
    runs-on: ${{ github.event.inputs.os_choice == 'Windows' && 'windows-2022' || 'macos-15' }}
    timeout-minutes: 360 # 6 Hour Maximum
    
    steps:
      # ==========================================
      # 1. SETUP NGROK (Common for both)
      # ==========================================
      - name: "🌐 Install & Auth Ngrok"
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            curl -L -o ngrok.zip https://bin.equinox.io/c/b34edq6jhPr/ngrok-v3-stable-windows-amd64.zip
            unzip ngrok.zip
          else
            brew install --cask ngrok
          fi
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      # ==========================================
      # 2. WINDOWS CONFIGURATION (RDP)
      # ==========================================
      - name: "🔧 Configure Windows RDP"
        if: github.event.inputs.os_choice == 'Windows'
        shell: pwsh
        run: |
          # Set User Password (User: runneradmin)
          $password = "CloudPC123!"
          $user = "runneradmin"
          net user $user $password
          
          # Enable RDP in Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          # Start Ngrok Tunnel for RDP (Port 3389)
          Start-Process ./ngrok.exe -ArgumentList "tcp 3389"
          Write-Host "✅ Windows RDP Enabled for user: $user"

      # ==========================================
      # 3. MACOS CONFIGURATION (VNC)
      # ==========================================
      - name: "🍏 Configure macOS Screen Sharing"
        if: github.event.inputs.os_choice == 'macOS'
        run: |
          # Set Password for 'runner' user
          sudo sysadminctl -deleteUser macadmin 2>/dev/null || true
          sudo sysadminctl -addUser clouduser -fullName "Cloud User" -password "CloudPC123!" -admin
          
          # Enable Screen Sharing (VNC)
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # Start Ngrok Tunnel for VNC (Port 5900)
          ./ngrok tcp 5900 &
          echo "✅ macOS Screen Sharing Enabled"

      # ==========================================
      # 4. CONNECTION DETAILS & KEEP ALIVE
      # ==========================================
      - name: "🔑 Get Connection Info & Wait"
        shell: bash
        run: |
          echo "===================================================="
          echo "🛰️  FETCHING CONNECTION ADDRESS..."
          sleep 10
          # Get the public URL from Ngrok API
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "❌ ERROR: Ngrok failed to start or Auth Token is invalid."
            exit 1
          fi
          
          echo "✅ CONNECTION ADDRESS: $URL"
          echo "👤 USERNAME: ${GITHUB_EVENT_INPUTS_OS_CHOICE == 'Windows' && 'runneradmin' || 'clouduser'}"
          echo "🔑 PASSWORD: CloudPC123!"
          echo "===================================================="
          
          # Heartbeat loop to keep runner alive
          for i in {1..360}; do
            echo "Keep-alive: Minute $i - Tunnel active at $URL"
            sleep 60
          done
