name: "macOS Remote Suite - RustDesk, AnyDesk & Browsers"

on:
  workflow_dispatch:
    inputs:
      REMOTE_PASSWORD:
        description: "Password for RustDesk & AnyDesk"
        default: "password123"
        required: true

jobs:
  remote-setup:
    name: "🚀 Full Access macOS Runner"
    runs-on: macos-14

    steps:
      - name: "👤 Create Admin Account"
        run: |
          USERNAME="admin"
          PASSWORD="123456"
          sudo dscl . -create /Users/$USERNAME
          sudo dscl . -create /Users/$USERNAME UserShell /bin/zsh
          sudo dscl . -create /Users/$USERNAME RealName "Admin User"
          sudo dscl . -create /Users/$USERNAME UniqueID "502"
          sudo dscl . -create /Users/$USERNAME PrimaryGroupID 20
          sudo dscl . -create /Users/$USERNAME NFSHomeDirectory /Users/$USERNAME
          sudo dscl . -passwd /Users/$USERNAME $PASSWORD
          sudo dscl . -append /Groups/admin GroupMembership $USERNAME
          sudo createhomedir -u $USERNAME -c
          echo "✅ Admin account created (admin/123456)"

      - name: "🚫 Disable Sleep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0 hibernatemode 0
          nohup caffeinate -dis & 
          echo "✅ Sleep disabled"

      - name: "🦀 Install RustDesk"
        run: brew install --cask rustdesk && echo "✅ RustDesk installed"

      - name: "⚡ Install AnyDesk"
        run: |
          brew install --cask anydesk
          # AnyDesk requires the service to be installed for unattended access
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --install-service || true
          echo "✅ AnyDesk installed"

      - name: "🌐 Install Antidetect Browsers (ARM64)"
        run: |
          # MostLogin
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-arm64-setup.dmg"
          sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse
          MOUNT_M=$(ls /Volumes | grep -i "MostLogin" | head -n 1)
          sudo cp -R "/Volumes/$MOUNT_M/MostLogin.app" /Applications/
          sudo hdiutil detach "/Volumes/$MOUNT_M" -force
          
          # GoLogin
          curl -L -o /tmp/gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"
          sudo hdiutil attach /tmp/gologin.dmg -nobrowse
          MOUNT_G=$(ls /Volumes | grep -i "GoLogin" | head -n 1)
          sudo cp -R "/Volumes/$MOUNT_G/GoLogin.app" /Applications/
          sudo hdiutil detach "/Volumes/$MOUNT_G" -force
          echo "✅ Browsers installed"

      - name: "🔓 SQLite3 Permission Injection"
        run: |
          APPS=("com.carriez.rustdesk" "com.philandro.anydesk" "com.gologin.app" "com.mostlogin.browser" "com.google.chromeremotedesktop.me2me-host")
          SERVICES=("kTCCServiceScreenCapture" "kTCCServiceAccessibility" "kTCCServicePostEvent")
          
          for DB in "/Library/Application Support/com.apple.TCC/TCC.db" "$HOME/Library/Application Support/com.apple.TCC/TCC.db"; do
            mkdir -p "$(dirname "$DB")"
            for APP in "${APPS[@]}"; do
              for SERVICE in "${SERVICES[@]}"; do
                sudo sqlite3 "$DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags, last_modified) VALUES ('$SERVICE', '$APP', 0, 2, 4, 1, 0, strftime('%s','now'));"
              done
            done
          done
          sudo killall -9 tccd || true
          echo "✅ Permissions injected"

      - name: "🔑 Set Remote Passwords (Global Fix)"
        run: |
          PW="${{ github.event.inputs.REMOTE_PASSWORD }}"
          
          # RustDesk Global Fix
          sudo pkill -9 rustdesk || true
          sudo defaults write /Library/Preferences/com.carriez.RustDesk.plist password "$PW"
          defaults write com.carriez.RustDesk password "$PW"
          open -a "RustDesk"
          sleep 2
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "$PW"
          
          # AnyDesk Global Fix
          # Piped input is required for AnyDesk security
          echo "$PW" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          open -a "AnyDesk"
          
          echo "✅ Passwords force-set for RustDesk and AnyDesk"

      - name: "📸 Capture Access IDs"
        run: |
          sleep 20
          screencapture -x /tmp/ids.png
          URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/ids.png" https://catbox.moe/user/api.php)
          echo "------------------------------------------------------"
          echo "🔗 VIEW IDs HERE: $URL"
          echo "🔑 PASSWORD: ${{ github.event.inputs.REMOTE_PASSWORD }}"
          echo "👤 ADMIN: admin | 123456"
          echo "------------------------------------------------------"

      - name: "🔄 Keep Alive Loop"
        run: |
          while true; do
            # Keep both apps in the foreground if they close
            pgrep -x "RustDesk" > /dev/null || open -a "RustDesk"
            pgrep -x "AnyDesk" > /dev/null || open -a "AnyDesk"
            sleep 30
          done
