name: "macOS RustDesk - OCR ID & Password"

on:
  workflow_dispatch:
    inputs:
      RUSTDESK_PASSWORD:
        description: "Set a custom RustDesk password"
        default: "password123"
        required: true

jobs:
  rustdesk:
    name: "🦀 Pure RustDesk with OCR"
    runs-on: macos-15

    steps:
      - name: "🦀 Install RustDesk & OCR Tools"
        run: |
          brew install --cask rustdesk
          brew install tesseract
          echo "✅ Tools installed"

      - name: "🔓 Grant Permissions"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          RUSTDESK="com.carriez.rustdesk"
          SQL_QUERY="
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$RUSTDESK', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$RUSTDESK', 0, 2, 4, 1, 0);
          "
          sudo sqlite3 "$TCC_DB" "$SQL_QUERY"
          sudo killall -9 tccd || true

      - name: "🚀 Start RustDesk"
        run: |
          RUSTDESK_APP=$(find /Applications -name "RustDesk.app" -type d | head -1)
          open "$RUSTDESK_APP"
          "$RUSTDESK_APP/Contents/MacOS/rustdesk" --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          sleep 20 # Wait for ID to generate

      - name: "🔍 Capture & OCR Credentials"
        id: ocr_step
        run: |
          # 1. Take the screenshot
          screencapture -x /tmp/screen.png
          
          # 2. Use Tesseract to read the text
          # We tell Tesseract to look specifically for digits/text
          tesseract /tmp/screen.png /tmp/output
          
          echo "--- RAW OCR DATA ---"
          cat /tmp/output.txt
          echo "--------------------"

          # 3. Extract ID (looking for 9-10 digit numbers with spaces)
          RD_ID=$(grep -E -o '[0-9 ]{9,12}' /tmp/output.txt | tr -d ' ' | head -n 1)
          
          # 4. Extract One-time Password (looking for the string after 'password')
          RD_OTP=$(grep -A 1 "password" /tmp/output.txt | tail -n 1 | tr -d ' ')

          echo "DETECTED_ID=$RD_ID" >> $GITHUB_ENV
          echo "DETECTED_OTP=$RD_OTP" >> $GITHUB_ENV

      - name: "🌐 Upload & Log Results"
        run: |
          IMAGE_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/screen.png" https://catbox.moe/user/api.php)
          
          echo "🚀 STATUS: READY TO CONNECT"
          echo "------------------------------------------------------"
          echo "🆔 RUSTDESK ID: ${{ env.DETECTED_ID }}"
          echo "🔑 FIXED PW:    ${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "🎲 ONE-TIME PW: ${{ env.DETECTED_OTP }}"
          echo "📸 SCREENSHOT:  $IMAGE_URL"
          echo "------------------------------------------------------"

      - name: "🔄 Monitor Loop"
        run: |
          PREVIOUS_STATE="off"
          while true; do
            CONN_COUNT=$(netstat -an | grep ESTABLISHED | grep -Ei "\.21116|\.21117" | wc -l)
            if [ "$CONN_COUNT" -gt 0 ]; then
                PREVIOUS_STATE="on"
            else
                if [ "$PREVIOUS_STATE" == "on" ]; then
                    echo "⚠️ Disconnected. Refreshing..."
                    open -a "RustDesk"
                    sleep 5
                    screencapture -x /tmp/screen.png
                    # Re-run OCR if you want the NEW one-time password
                    tesseract /tmp/screen.png /tmp/output
                    NEW_ID=$(grep -E -o '[0-9 ]{9,12}' /tmp/output.txt | tr -d ' ' | head -n 1)
                    NEW_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/screen.png" https://catbox.moe/user/api.php)
                    echo "NEW ID: $NEW_ID | NEW URL: $NEW_URL"
                    PREVIOUS_STATE="off"
                fi
            fi
            sleep 15
          done
