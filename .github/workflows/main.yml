name: "Cloud PC Setup (Windows / macOS)"
on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022
    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ Missing CRD Code!"
            exit 1
          }
      - name: "🔧 Install CRD & Virtual Audio"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"
      - name: "🌟 Start Chrome Remote Desktop"
        run: cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"
      - name: "⏳ Keep Alive"
        run: while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB (Fixed Initial Screenshot & Monitoring)
  # ==========================================
  macos-setup:
    name: "🍏 macOS Remote Runner (macOS 14)"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-14
    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "CloudPC123!" -admin

      - name: "🖥️ Install Remote Tools"
        run: |
          brew install --cask --no-quarantine rustdesk
          # Install MostLogin
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          MOUNT_ML=$(sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep -o '/Volumes/.*')
          sudo cp -R "$MOUNT_ML"/*.app /Applications/
          sudo hdiutil detach "$MOUNT_ML" -force
          # Start RustDesk and wait for config generation
          open /Applications/RustDesk.app
          sleep 15

      - name: "📊 Smart Monitoring Loop"
        run: |
          echo "🚀 Starting High-Frequency Monitoring..."
          
          # LOOP 1: Log ID/PW every 1s
          (
            while true; do
              CONFIG=$(ls ~/Library/Application\ Support/RustDesk/config/*.toml 2>/dev/null | head -n 1)
              if [ -f "$CONFIG" ]; then
                ID=$(grep 'id =' "$CONFIG" | cut -d"'" -f2)
                PW=$(grep 'password =' "$CONFIG" | cut -d"'" -f2)
                echo "[$(date +%T)] 🔑 ID: $ID | 🔒 PW: $PW"
              fi
              sleep 1
            done
          ) &

          # LOOP 2: Immediate Screenshot + Smart Re-capture on Disconnect
          (
            # --- MANDATORY INITIAL UPLOAD ---
            echo "[$(date +%T)] 📸 Capturing FIRST screen..."
            screencapture -x /tmp/initial.png
            FIRST_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/initial.png" https://catbox.moe/user/api.php)
            echo "[$(date +%T)] 🚀 INITIAL LINK: $FIRST_URL"

            while true; do
              # Specifically check for established sessions on RustDesk relay/direct ports (21116-21119)
              # This avoids false positives from system telemetry
              CONNECTION_CHECK=$(netstat -an | grep ESTABLISHED | grep -E "\.2111[7-9]")
              
              if [ -z "$CONNECTION_CHECK" ]; then
                # No active user found -> Force GUI to front and capture
                open /Applications/RustDesk.app
                screencapture -x /tmp/loop.png
                URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/loop.png" https://catbox.moe/user/api.php)
                echo "[$(date +%T)] 📸 Disconnected - View GUI: $URL"
              else
                # Connection detected -> Be quiet to save log space
                echo "[$(date +%T)] 🟢 User Connected. Standing by..."
              fi
              sleep 5
            done
          ) &

          # Prevent job timeout
          while true; do sleep 60; done
