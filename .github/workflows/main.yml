name: "High-Speed Cloud PC (Ngrok Tunnel)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select OS"
        type: choice
        options:
          - Windows
          - macOS
        default: Windows
        required: true

jobs:
  deploy-cloud-pc:
    name: "🚀 ${{ github.event.inputs.os_choice }} Runner"
    runs-on: ${{ github.event.inputs.os_choice == 'Windows' && 'windows-2022' || 'macos-15' }}
    timeout-minutes: 360 
    
    steps:
      # ==========================================
      # 1. SETUP NGROK
      # ==========================================
      - name: "🌐 Install & Auth Ngrok"
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            curl -L -o ngrok.zip https://bin.equinox.io/c/b34edq6jhPr/ngrok-v3-stable-windows-amd64.zip
            unzip ngrok.zip
            mv ngrok.exe /usr/local/bin/ 2>/dev/null || mv ngrok.exe C:/Windows/System32/
          else
            brew install --cask ngrok
          fi
          ngrok config add-authtoken 3AhMlOU44xocXTENyLvM64XkVNW_5jEpfgSNQs7kBB13WH7FD

      # ==========================================
      # 2. WINDOWS CONFIGURATION (RDP)
      # ==========================================
      - name: "🔧 Configure Windows RDP"
        if: github.event.inputs.os_choice == 'Windows'
        shell: pwsh
        run: |
          $password = "CloudPC123!"
          $user = "runneradmin"
          net user $user $password
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Start-Process ngrok -ArgumentList "tcp 3389"
          Write-Host "✅ Windows RDP Ready"

      # ==========================================
      # 3. MACOS CONFIGURATION (FIXED VNC)
      # ==========================================
      - name: "🍏 Configure macOS Screen Sharing"
        if: github.event.inputs.os_choice == 'macOS'
        run: |
          # 1. Create User
          sudo sysadminctl -addUser clouduser -fullName "Cloud User" -password "CloudPC123!" -admin
          
          # 2. Enable Remote Management (ARDAgent)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -users clouduser -privs -all -restart -agent
          
          # 3. Fix: Set VNC Password correctly (Avoids the previous error)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd CloudPC123!
          
          # 4. Start Tunnel
          ngrok tcp 5900 &
          echo "✅ macOS Screen Sharing Enabled"

      # ==========================================
      # 4. CONNECTION DETAILS
      # ==========================================
      - name: "🔑 Get Connection Info"
        shell: bash
        run: |
          echo "🛰️  Wait for Ngrok (20s)..."
          sleep 20
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "❌ ERROR: Ngrok failed. Check logs above."
            exit 1
          fi
          
          echo "===================================================="
          echo "✅ ADDRESS: $URL"
          echo "👤 USER: ${{ github.event.inputs.os_choice == 'Windows' && 'runneradmin' || 'clouduser' }}"
          echo "🔑 PASS: CloudPC123!"
          echo "===================================================="
          
          for i in {1..360}; do
            echo "Session Active: Minute $i - URL: $URL"
            sleep 60
          done
